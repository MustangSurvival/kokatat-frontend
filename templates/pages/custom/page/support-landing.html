{{#partial "page"}}

  <main class="page" id="support-pages">
    <div class="secondary-marquee">
      <div class="heroCarousel-slide">
        <div class="heroCarousel-image-wrapper">
          <img class="heroCarousel-image" alt="" title="" src="">
          <div class="placeholder">
            <canvas height="450" width="1480"></canvas>
          </div>
        </div>
        <div class="content-container">
          <div class="content-wrapper">
            <div class="copy-container">
              {{#unless theme_settings.hide_page_heading }}
                <h1 class="page-heading">{{ page.title }}</h1>
              {{/unless}}
                <p class="page-subhead"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="content-container">
      <div class="support-container">
        <div class="page-content">
            <h2 class="top-header"></h2>
            <div class="copy-block"></div>
            <div id="support-links">
              <nav class="navBar navBar--sub">
                <ul class="navBar-section account-navigation">

                </ul>
              </nav>
            </div>
        </div>
      </div>
      <div class="support-panel-container">
        {{> kokatat/components/common/support-panel}}
      </div>
    </div>
  </main>
{{/partial}}

{{> layout/base}}
