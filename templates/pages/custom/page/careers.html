{{#partial "page"}}

  <main class="page" id="careers-page">
    <div class="secondary-marquee">
      <div class="heroCarousel-slide">
        <div class="heroCarousel-image-wrapper">
          <img class="heroCarousel-image" alt="" title="" src="">
          <div class="placeholder">
            <canvas height="450" width="1480"></canvas>
          </div>
        </div>
        <div class="content-container">
          <div class="content-wrapper">
            <div class="copy-container">
              {{#unless theme_settings.hide_page_heading }}
                <h1 class="page-heading">{{ page.title }}</h1>
              {{/unless}}
                <p class="page-subhead"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="careers-container">
      <div class="content-container">
        <section class="page-content page-content--centered">

        </section>
      </div>
    </div>
    <div class="support-panel-container">
      {{> kokatat/components/common/support-panel}}
    </div>
  </main>
{{/partial}}

{{> layout/base}}
