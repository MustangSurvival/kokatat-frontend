<div class="pagination">
    <ul class="pagination-list">
        {{#if previous}}
            <li class="pagination-item pagination-item--previous">
                <a class="pagination-link" href="{{previous}}" {{#unless reload}}data-faceted-search-facet{{/unless}}>
                    <i class="icon prev" aria-hidden="true">
                        <svg id="Icon_TextLinkArrow_Prev" xmlns="http://www.w3.org/2000/svg" width="18" height="10" viewBox="0 0 15.865 10">
                            <path id="Color_Overlay" data-name="Color Overlay"
                          d="M10.771,9.843a.531.531,0,0,1,0-.767l3.784-3.623H.582A.525.525,0,0,1,0,4.9a.524.524,0,0,1,.582-.557H14.337L10.771.924a.531.531,0,0,1,0-.766.589.589,0,0,1,.8,0L15.429,3.85A1.118,1.118,0,0,1,15.865,4.9a2.027,2.027,0,0,1-.437,1.254L11.571,9.843a.589.589,0,0,1-.8,0Z"
                          fill="#76A639" />
                        </svg>
                    </i>
                    {{lang 'common.previous'}}
                </a>
            </li>
        {{/if}}
        <div class="test test">{{json this}}</div>
        {{#each links}}
            {{#if this.number '==' ../current}}
                <li class="pagination-item pagination-item--current">
                    <a class="pagination-link" href="{{this.url}}" {{#unless reload}}data-faceted-search-facet{{/unless}}>{{this.number}}</a>
                </li>
            {{else}}
                <li class="pagination-item number">
                    <a class="pagination-link" href="{{this.url}}" {{#unless reload}}data-faceted-search-facet{{/unless}}>{{this.number}}</a>
                </li>
            {{/if}}
        {{/each}}

        {{#if next}}
            <li class="pagination-item pagination-item--next">
                <a class="pagination-link" href="{{next}}" {{#unless reload}}data-faceted-search-facet{{/unless}}>
                    {{lang 'common.next'}}
                    <i class="icon" aria-hidden="true">
                        <svg id="Icon_TextLinkArrow" xmlns="http://www.w3.org/2000/svg" width="18" height="10" viewBox="0 0 15.865 10">
                            <path id="Color_Overlay" data-name="Color Overlay"
                          d="M10.771,9.843a.531.531,0,0,1,0-.767l3.784-3.623H.582A.525.525,0,0,1,0,4.9a.524.524,0,0,1,.582-.557H14.337L10.771.924a.531.531,0,0,1,0-.766.589.589,0,0,1,.8,0L15.429,3.85A1.118,1.118,0,0,1,15.865,4.9a2.027,2.027,0,0,1-.437,1.254L11.571,9.843a.589.589,0,0,1-.8,0Z"
                          fill="#76A639" />
                        </svg>
                    </i>
                </a>
            </li>
        {{/if}}
    </ul>
</div>
